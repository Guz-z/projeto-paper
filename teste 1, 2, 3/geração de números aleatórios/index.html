<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Conjuntos Numéricos</title>
   <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="container">
        <h2>Gerador Numérico</h2>
        <p>Gere números aleatórios de até 2 dígitos de qualquer conjunto numérico.</p>
        
        <button id="btnGerar">Gerar Número</button>

        <div class="resultado-box">
            <p id="numero">-</p>
            <p id="conjunto">Clique no botão para começar</p>
        </div>
    </div>

    <script>
        // Função que gera o número (a mesma que criamos antes)
        function gerarNumeroAleatorioPorConjunto() {
            const conjuntos = ['Natural', 'Inteiro', 'Racional', 'Irracional'];
            const conjuntoEscolhido = conjuntos[Math.floor(Math.random() * conjuntos.length)];
            
            let numero;
            let sinal = Math.random() < 0.5 ? -1 : 1;

            switch (conjuntoEscolhido) {
                case 'Natural':
                    numero = Math.floor(Math.random() * 100);
                    break;
                case 'Inteiro':
                    numero = Math.floor(Math.random() * 100) * sinal;
                    break;
                case 'Racional':
                    let parteInteiraQ = Math.floor(Math.random() * 100);
                    let parteDecimalQ = Math.floor(Math.random() * 100) / 100;
                    numero = parseFloat((parteInteiraQ + parteDecimalQ).toFixed(2)) * sinal;
                    break;
                case 'Irracional':
                    let parteInteiraI = Math.floor(Math.random() * 100);
                    let parteDecimalI = Math.random(); 
                    numero = (parteInteiraI + parteDecimalI) * sinal;
                    break;
            }

            return {
                conjunto: conjuntoEscolhido,
                valor: numero
            };
        }

        // Conectando o JavaScript com os elementos da tela (HTML)
        const botao = document.getElementById('btnGerar');
        const elementoNumero = document.getElementById('numero');
        const elementoConjunto = document.getElementById('conjunto');

        // Ouvindo o clique do botão
        botao.addEventListener('click', function() {
            const resultado = gerarNumeroAleatorioPorConjunto();
            
            // Atualiza os textos na tela
            elementoNumero.textContent = resultado.valor;
            elementoConjunto.textContent = `Conjunto Numérico: ${resultado.conjunto}`;
        });
    </script>

</body>
</html>
